# =====================================================================
# default.cfg — Home Furnishing Competition runtime configuration.
# Pass this file as argv[1] to the executable, e.g.:
#   ./build/furnishing config/default.cfg
# Anything you change here takes effect on the next run — no recompile.
# Lines starting with '#' are comments. Format: key = value
# =====================================================================

# Number of members in each team. Includes source (member 0) and sink
# (member team_size-1). Allowed range: 2..32.
team_size      = 5

# Number of furniture pieces per house (one pair per piece).
# Default in spec is 1000; lowered here so demos finish quickly.
num_pieces     = 50

# Per-member random pause range (milliseconds), before fatigue.
min_pause_ms   = 30
max_pause_ms   = 120

# Fatigue: pause max grows multiplicatively with pieces handled.
# 1.0 = no fatigue. 1.001 = +0.1% per piece. Capped at fatigue_cap_ms.
fatigue_factor = 1.002
fatigue_cap_ms = 600

# How many round wins are needed to end the match.
wins_to_match  = 3

# Random seeding mode.
#   random  — each child seeds from time^pid (default)
#   user    — seed deterministically from user_seed below (reproducible runs)
seed_mode      = random
user_seed      = 42

# OpenGL/GLUT visualization. Set to 0 for headless (server / CI / debugging).
gui_enabled    = 1

# Verbose logging from referee (round wins, etc.)
verbose        = 1
